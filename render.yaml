services:
  - type: web
    name: study-planner-web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: study-planner-db
          property: connectionString
      - key: DB_SSL
        value: "true"

databases:
  - name: study-planner-db
    plan: free
